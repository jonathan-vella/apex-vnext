# CI Workflow
# Single required status check for all PRs to main
# Consolidates: lint, agent-validation, policy-compliance-check
# Runs markdown linting + all Node.js validators + handoff validation

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feature/*]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: ./.github/actions/setup-node-repo

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Lint Markdown
        run: npm run lint:md

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Build vNext and run Node.js validators (CI-safe)
        run: npm run validate:_node-ci

      - name: Validate hooks
        run: npm run validate:hooks

      - name: Run hook tests
        run: npm run test:hooks

      - name: Validate APEX vNext contracts and customizations
        run: npm run validate:vnext

      - name: Run APEX vNext deterministic tests
        run: npm run test:vnext

      - name: Test APEX vNext validator
        run: npm run test:vnext-validator

      - name: Test APEX vNext clean-install packages
        run: npm run test:vnext-pack

      - name: Re-render SKU manifest MD and check for drift
        run: |
          # Deterministic renderer must produce byte-equal MD for every
          # JSON. Drift here indicates an agent hand-edited the MD or
          # forgot to re-render after mutating JSON — both forbidden.
          # See: .github/instructions/sku-manifest.instructions.md
          shopt -s nullglob
          for json in agent-output/*/sku-manifest.json; do
            project=$(basename "$(dirname "$json")")
            echo "  rendering $project"
            node tools/scripts/render-sku-manifest-md.mjs "$project"
          done
          if ! git diff --exit-code -- '**/sku-manifest.md'; then
            echo "::error::sku-manifest.md is stale relative to JSON. Run 'node tools/scripts/render-sku-manifest-md.mjs <project>' and commit the result."
            exit 1
          fi

      - name: Validate handoff references
        run: bash tools/scripts/validate-handoff-references.sh

  external-tests:
    name: External Python tests (apex-recall + azure-pricing MCP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: ./.github/actions/setup-node-repo

      - name: Setup Python validation
        uses: ./.github/actions/setup-python-validation

      - name: Lint Python (ruff)
        # ruff ships via the azure-pricing[dev] extra installed above. Mirrors
        # the pre-commit python-lint hook so format/lint drift cannot land on main.
        run: npm run lint:python

      - name: Run apex-recall test suite
        run: npm run test:apex-recall

      - name: Run azure-pricing MCP test suite
        run: npm run test:azure-pricing-mcp
