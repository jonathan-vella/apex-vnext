# E2E Validation Workflow
# Validates Ralph Loop E2E artifacts and runs benchmark scoring.
# Manual trigger + weekly schedule. Does NOT invoke agents — validates existing artifacts.

name: e2e-validation

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Project to benchmark"
        required: false
        default: "contoso-service-hub-run-1"
  schedule:
    - cron: "0 9 * * 1" # Weekly on Monday at 09:00 UTC (staggered: see .github/workflows/README.md#weekly-cron-schedule)

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate E2E artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: ./.github/actions/setup-node-repo

      - name: Validate E2E artifacts (all steps)
        run: npm run e2e:validate

  benchmark:
    # Benchmarks are informational — scoring drift shouldn't fail the build,
    # but validation regressions do (see the `validate` job above).
    name: Benchmark E2E projects
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: ./.github/actions/setup-node-repo

      - name: Benchmark Bicep project
        run: npm run e2e:benchmark -- ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.project || 'contoso-service-hub-run-1' }}
        continue-on-error: true

      - name: Benchmark Terraform project (terraform-e2e)
        run: npm run e2e:benchmark -- terraform-e2e
        continue-on-error: true

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-benchmark-reports
          path: |
            agent-output/*/08-benchmark-report.md
            agent-output/*/08-benchmark-scores.json
          retention-days: 30
